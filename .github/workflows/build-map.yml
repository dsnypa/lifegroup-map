name: Build LifeGroup Map

on:
  workflow_dispatch:
  push:
    paths:
      - 'input/lifegroups.csv'
      - 'scripts/build_map.py'
      - 'requirements.txt'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build map
        run: python scripts/build_map.py

      - name: Upload generated map
        uses: actions/upload-artifact@v6
        with:
          name: lifegroups-map
          path: output/lifegroups_map.html
